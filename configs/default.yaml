# Default training configuration
model:
  hidden_dim: 128
  n_heads: 4
  n_layers: 4
  max_seq_len: 60
  dropout: 0.1

collect:
  episodes: 1000
  min_return_percentile: 80  # keep top 20% trajectories for SFT

sft:
  epochs: 50
  lr: 0.0001
  batch_size: 32

rl:
  episodes: 2000
  batch_size: 10
  lr: 0.00005
  target_return: 20.0  # condition on 20% desired return
  eval_interval: 200

environment:
  n_days: 252
  initial_cash: 100000
  commission_bps: 2
