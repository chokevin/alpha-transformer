# Default training configuration
model:
  hidden_dim: 128
  n_heads: 4
  n_layers: 4
  max_seq_len: 60
  dropout: 0.1

collect:
  episodes: 2000
  min_return_percentile: 80  # keep top 20% trajectories for SFT

sft:
  epochs: 100
  lr: 0.0003
  batch_size: 64

rl:
  episodes: 2000
  batch_size: 20
  lr: 0.0001
  target_return: 15.0  # condition on 15% desired return (realistic)
  eval_interval: 200

environment:
  n_days: 252
  initial_cash: 100000
  commission_bps: 2
